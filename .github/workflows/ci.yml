name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      # Tells Terminal.Gui drivers to skip real-terminal probing/IO
      # so the ANSI driver runs on Windows runners without a TTY.
      DisableRealDriverIO: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Terminal.Gui.Text.slnx

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build Terminal.Gui.Text.slnx --no-restore

      # Style gate runs once (Linux). dotnet format catches whitespace/analyzer drift;
      # jb cleanupcode catches what dotnet format misses (var, expression-bodied members,
      # XML doc spacing, using sorting). Both must produce a clean working tree.
      - name: Verify code style — dotnet format
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet format Terminal.Gui.Text.slnx --no-restore --exclude third_party/ --verify-no-changes

      - name: Verify code style — ReSharper cleanupcode
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Use our custom profile name defined in the team-shared .DotSettings file.
          # Previous attempts used "Built-in: Full Cleanup" which worked but didn't pick
          # up our tweaks (CSUseAutoProperty OFF, etc.). The custom-named profile resolves
          # reliably from the .DotSettings file.
          dotnet jb cleanupcode Terminal.Gui.Text.slnx \
            --profile="TG.Text Full Cleanup" \
            --no-build \
            --exclude="third_party/**/*" \
            || true
          if ! git diff --exit-code; then
            echo "::error::ReSharper code cleanup found style drift. Run 'dotnet jb cleanupcode Terminal.Gui.Text.slnx --profile=\"TG.Text Full Cleanup\"' locally and commit the result."
            exit 1
          fi

      - name: Terminal.Gui.Text.Tests
        run: dotnet run --project tests/Terminal.Gui.Text.Tests --no-build

      - name: Terminal.Gui.Editor.Tests
        run: dotnet run --project tests/Terminal.Gui.Editor.Tests --no-build

      - name: Terminal.Gui.Editor.IntegrationTests
        run: dotnet run --project tests/Terminal.Gui.Editor.IntegrationTests --no-build

      # Performance gate: run focused benchmarks on Linux only, compare to baseline.
      # Fails on >3x regression; celebrates >20% improvement.
      - name: Performance check
        if: matrix.os == 'ubuntu-latest'
        run: |
          OUTPUT=$(bash benchmarks/compare-baseline.sh 3.0 0.8 2>&1) || PERF_FAILED=1
          echo "$OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          if [ "${PERF_FAILED:-0}" -eq 1 ]; then
            exit 1
          fi

