name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Terminal.Gui.Text.slnx

      - name: Build
        run: dotnet build Terminal.Gui.Text.slnx --no-restore

      - name: Terminal.Gui.Text.Tests
        run: dotnet run --project tests/Terminal.Gui.Text.Tests --no-build

      - name: Terminal.Gui.Editor.Tests
        run: dotnet run --project tests/Terminal.Gui.Editor.Tests --no-build

      - name: Terminal.Gui.Editor.IntegrationTests
        run: dotnet run --project tests/Terminal.Gui.Editor.IntegrationTests --no-build

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Terminal.Gui.Text.slnx

      - name: Verify formatting
        # Lifted AvaloniaEdit code (Document/, Utils/, and their tests) intentionally
        # preserves upstream formatting per specs/00-plan.md §4 — exclude from the gate
        # so re-syncs don't get fought by dotnet format.
        run: >
          dotnet format Terminal.Gui.Text.slnx --verify-no-changes --no-restore
          --exclude third_party/
          --exclude src/Terminal.Gui.Text/Document/
          --exclude src/Terminal.Gui.Text/Utils/
          --exclude tests/Terminal.Gui.Text.Tests/Document/
          --exclude tests/Terminal.Gui.Text.Tests/Utils/
